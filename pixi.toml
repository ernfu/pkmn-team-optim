[workspace]
name = "gen3-optim"
version = "0.1.0"
description = "Pokemon team optimizer with CLI, web UI, and data compilation workflows."
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[dependencies]
python = ">=3.10,<3.13"

[pypi-dependencies]
flask = "*"
highspy = "*"
pokebase = "*"
pulp = "*"
pytest = "*"

[tasks]
test = "pytest"
cli = "python -m optimiser"
web = "python app.py"
compile-frlg = "python -m data.pokedex compile firered-leafgreen-regional"
compile-frlg-national = "python -m data.pokedex compile firered-leafgreen-national"
compile-bdsp = "python -m data.pokedex compile brilliant-diamond-shining-pearl-regional"
compile-bdsp-national = "python -m data.pokedex compile brilliant-diamond-shining-pearl-national"